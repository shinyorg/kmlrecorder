name: KmlRecorderWidget
options:
  bundleIdPrefix: org.shiny.kmlrecorder
  deploymentTarget:
    iOS: "17.0"

targets:
  KmlRecorderWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - KmlRecorderWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.shiny.kmlrecorder.widget
        INFOPLIST_FILE: KmlRecorderWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: KmlRecorderWidget/KmlRecorderWidget.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
